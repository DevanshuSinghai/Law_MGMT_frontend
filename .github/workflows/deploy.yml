name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify build output
        run: |
          set -euo pipefail
          test -f dist/index.html
          echo "dist contents:"
          ls -la dist

      # Bundle the build into a single tarball — avoids scp glob/strip pitfalls.
      - name: Package build
        run: tar -czf dist.tar.gz -C dist .

      - name: Upload tarball to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "dist.tar.gz"
          target: "/tmp/law-mgmt-frontend/"
          overwrite: true

      - name: Extract, swap, reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail
            DEST=/var/www/law-mgmt/frontend/dist
            TAR=/tmp/law-mgmt-frontend/dist.tar.gz
            test -f "$TAR"
            # Deploy into a fresh dir, then atomically swap so users never see a half-copy.
            rm -rf "${DEST}.new"
            mkdir -p "${DEST}.new"
            tar -xzf "$TAR" -C "${DEST}.new"
            test -f "${DEST}.new/index.html"
            rm -rf "${DEST}.old"
            if [ -d "$DEST" ]; then mv "$DEST" "${DEST}.old"; fi
            mv "${DEST}.new" "$DEST"
            rm -rf "${DEST}.old" "$TAR"
            # Static files need no reload, but re-test + reload keeps config drift honest.
            echo "${{ secrets.VPS_SUDO_PASSWORD }}" | sudo -S nginx -t
            echo "${{ secrets.VPS_SUDO_PASSWORD }}" | sudo -S systemctl reload nginx
            echo "Deployed. index.html:"
            ls -l "$DEST/index.html"
